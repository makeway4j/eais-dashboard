<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EAIS Login</title>
  <style>
    :root {
      --bg: #141413;
      --ink: #faf9f5;
      --muted: #b0aea5;
      --soft: #e8e6dc;
      --accent: #d97757;
      --line: rgba(250, 249, 245, 0.16);
      --panel: rgba(20, 20, 19, 0.82);
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 72% 15%, rgba(217, 119, 87, 0.2), transparent 34%),
        linear-gradient(135deg, #141413 0%, #181715 50%, #2a1712 100%);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before,
    body::after {
      position: fixed;
      inset: 0;
      content: "";
      pointer-events: none;
    }

    body::before {
      opacity: 0.26;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 64px 64px;
      animation: drift-grid 18s linear infinite;
    }

    body::after {
      background:
        linear-gradient(115deg, transparent 0 42%, rgba(250, 249, 245, 0.08) 49%, transparent 56%),
        repeating-linear-gradient(0deg, rgba(250, 249, 245, 0.035) 0 1px, transparent 1px 5px);
      mix-blend-mode: screen;
      animation: scan-pass 5.4s ease-in-out infinite;
    }

    .login-shell {
      position: relative;
      z-index: 1;
      display: grid;
      width: min(920px, calc(100vw - 32px));
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.8fr);
      overflow: hidden;
      border: 1px solid rgba(217, 119, 87, 0.42);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(18px);
    }

    .brand-stage {
      position: relative;
      min-height: 520px;
      padding: 52px;
      overflow: hidden;
    }

    .brand-stage::before {
      position: absolute;
      width: 520px;
      height: 520px;
      right: -180px;
      top: -160px;
      border: 1px solid rgba(217, 119, 87, 0.28);
      border-radius: 50%;
      content: "";
      animation: orbit-ring 16s linear infinite;
    }

    .brand-stage::after {
      position: absolute;
      inset: 32px;
      border: 1px solid rgba(250, 249, 245, 0.08);
      content: "";
      clip-path: polygon(0 0, 78% 0, 100% 28%, 100% 100%, 18% 100%, 0 78%);
    }

    .brand-mark {
      display: inline-grid;
      width: 76px;
      height: 76px;
      margin-bottom: 28px;
      place-items: center;
      border: 1px solid rgba(250, 249, 245, 0.2);
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), rgba(250, 249, 245, 0.08));
      color: var(--ink);
      font-size: 36px;
      font-weight: 950;
      letter-spacing: 0;
      box-shadow: 0 0 42px rgba(217, 119, 87, 0.24);
      animation: mark-pulse 3.8s ease-in-out infinite;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(56px, 9vw, 112px);
      line-height: 0.86;
      letter-spacing: 0;
    }

    .tagline {
      max-width: 460px;
      margin: 22px 0 0;
      color: var(--soft);
      font-size: 19px;
      line-height: 1.5;
    }

    .status-strip {
      position: absolute;
      left: 52px;
      right: 52px;
      bottom: 48px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .status-strip span {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(250, 249, 245, 0.04);
      padding: 12px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .status-strip b {
      display: block;
      margin-top: 4px;
      color: var(--ink);
      font-size: 14px;
      text-transform: none;
    }

    .login-panel {
      display: grid;
      align-content: center;
      gap: 18px;
      border-left: 1px solid var(--line);
      background: rgba(20, 20, 19, 0.62);
      padding: 44px;
    }

    .login-panel h2 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0;
    }

    .login-panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(20, 20, 19, 0.92);
      color: var(--ink);
      padding: 13px 14px;
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: rgba(217, 119, 87, 0.82);
      box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.16);
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: var(--bg);
      cursor: pointer;
      font: inherit;
      font-weight: 950;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .login-message {
      min-height: 20px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
    }

    @keyframes drift-grid {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(64px, 64px, 0); }
    }

    @keyframes scan-pass {
      0%, 100% { transform: translateX(-18%); opacity: 0.22; }
      50% { transform: translateX(18%); opacity: 0.5; }
    }

    @keyframes orbit-ring {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes mark-pulse {
      0%, 100% { transform: translateY(0); box-shadow: 0 0 34px rgba(217, 119, 87, 0.22); }
      50% { transform: translateY(-3px); box-shadow: 0 0 58px rgba(217, 119, 87, 0.38); }
    }

    @media (max-width: 780px) {
      body {
        overflow: auto;
        padding: 18px 0;
      }

      .login-shell {
        grid-template-columns: 1fr;
      }

      .brand-stage {
        min-height: 420px;
        padding: 34px;
      }

      .status-strip {
        position: relative;
        left: auto;
        right: auto;
        bottom: auto;
        grid-template-columns: 1fr;
        margin-top: 34px;
      }

      .login-panel {
        border-left: 0;
        border-top: 1px solid var(--line);
        padding: 34px;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell" aria-label="EAIS secure login">
    <section class="brand-stage">
      <div class="brand-mark">E</div>
      <p class="eyebrow">Executive AI Intelligence System</p>
      <h1>E.A.I.S.</h1>
      <p class="tagline">Private command access for daily intelligence, revenue systems, homelab operations, and Kora-assisted planning.</p>
      <div class="status-strip" aria-label="System posture">
        <span>Node <b>CT 301</b></span>
        <span>Assistant <b>Kora VM 302</b></span>
        <span>Mode <b>Secure</b></span>
      </div>
    </section>

    <form class="login-panel" id="login-form">
      <div>
        <p class="eyebrow">Secure Access</p>
        <h2>Sign in</h2>
        <p>Enter your EAIS credentials to open the dashboard.</p>
      </div>
      <label>
        Username
        <input id="username" name="username" autocomplete="username" required autofocus>
      </label>
      <label>
        Password
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit" id="login-button">Enter EAIS</button>
      <div class="login-message" id="login-message" role="status" aria-live="polite"></div>
    </form>
  </main>

  <script>
    const form = document.querySelector("#login-form");
    const button = document.querySelector("#login-button");
    const message = document.querySelector("#login-message");
    const next = new URL(window.location.href).searchParams.get("next") || "/";

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      message.textContent = "Checking credentials...";

      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: form.username.value,
            password: form.password.value
          })
        });
        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Login failed.");
        }

        message.textContent = "Access granted.";
        window.location.assign(next.startsWith("/") ? next : "/");
      } catch (error) {
        message.textContent = error.message;
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
